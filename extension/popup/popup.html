<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #1e293b;
    }

    .header img {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #f8fafc;
    }

    .header .version {
      font-size: 11px;
      color: #64748b;
      margin-left: auto;
    }

    .status-card {
      margin: 16px 20px;
      padding: 16px;
      border-radius: 12px;
      text-align: center;
    }

    .status-card.safe {
      background: linear-gradient(135deg, #064e3b, #065f46);
      border: 1px solid #10b981;
    }

    .status-card.suspicious {
      background: linear-gradient(135deg, #78350f, #92400e);
      border: 1px solid #f59e0b;
    }

    .status-card.phishing {
      background: linear-gradient(135deg, #7f1d1d, #991b1b);
      border: 1px solid #ef4444;
    }

    .status-card.unknown {
      background: linear-gradient(135deg, #1e293b, #334155);
      border: 1px solid #475569;
    }

    .status-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .status-label {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-bar {
      margin: 10px auto 0;
      width: 80%;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .score-fill.safe { background: #10b981; }
    .score-fill.suspicious { background: #f59e0b; }
    .score-fill.phishing { background: #ef4444; }
    .score-fill.unknown { background: #6b7280; }

    .score-text {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .details {
      padding: 0 20px 16px;
    }

    .details h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .reason-list {
      list-style: none;
    }

    .reason-list li {
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .reason-list li:last-child {
      border-bottom: none;
    }

    .reason-list li::before {
      content: "•";
      color: #64748b;
      flex-shrink: 0;
    }

    .url-display {
      padding: 8px 20px 12px;
      font-size: 11px;
      color: #64748b;
      word-break: break-all;
      line-height: 1.4;
    }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer .source {
      font-size: 11px;
      color: #475569;
    }

    .btn-reanalyze {
      padding: 6px 14px;
      font-size: 12px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-reanalyze:hover {
      background: #2563eb;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="../icons/default-32.png" alt="PhishGuard" id="headerIcon">
    <h1>PhishGuard</h1>
    <span class="version">v1.0.0</span>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Analyzing page...</div>
  </div>

  <div id="content" style="display: none;">
    <div id="statusCard" class="status-card unknown">
      <div id="statusIcon" class="status-icon">🔍</div>
      <div id="statusLabel" class="status-label">Analyzing</div>
      <div class="score-bar">
        <div id="scoreFill" class="score-fill unknown" style="width: 0%"></div>
      </div>
      <div id="scoreText" class="score-text">Threat score: --</div>
    </div>

    <div id="urlDisplay" class="url-display"></div>

    <div id="detailsSection" class="details" style="display: none;">
      <h3>Analysis Details</h3>
      <ul id="reasonList" class="reason-list"></ul>
    </div>
  </div>

  <div class="footer">
    <span class="source" id="sourceLabel">—</span>
    <button class="btn-reanalyze" id="btnReanalyze">Re-analyze</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
