<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ── -->
  <div class="header">
    <div class="header-brand">
      <img class="header-logo" src="../icons/default-32.png" alt="PhishGuard" id="headerIcon">
      <h1>PhishGuard</h1>
    </div>
    <span class="header-version">v1.0.0</span>
  </div>

  <!-- ── Loading State ── -->
  <div id="loading" class="loading-state">
    <div class="loading-spinner"></div>
    <div class="loading-text">Analyzing page…</div>
    <div class="loading-subtext">Running security audit</div>
  </div>

  <!-- ── Main Content (hidden until loaded) ── -->
  <div id="content" class="main-content hidden">

    <!-- Status Hero Card -->
    <div id="statusCard" class="status-hero unknown">
      <div id="statusShield" class="status-shield">🔍</div>
      <div id="statusTitle" class="status-title">Analyzing</div>
      <div id="statusSubtitle" class="status-subtitle">Running security checks on this origin…</div>
    </div>

    <!-- Threat Score -->
    <div class="threat-score-section">
      <span class="threat-score-label">Threat</span>
      <div class="threat-bar-track">
        <div id="threatFill" class="threat-bar-fill" style="width: 0%"></div>
      </div>
      <span id="threatValue" class="threat-score-value">—</span>
    </div>

    <!-- URL Display -->
    <div id="urlDisplay" class="url-display"></div>

    <!-- Security Audit -->
    <div id="auditSection" class="hidden">
      <div class="section-label">Security Audit</div>
      <ul id="auditList" class="audit-list"></ul>
    </div>

    <!-- Intel Pipeline Chip -->
    <div id="intelChip" class="intel-chip">
      <span id="intelDot" class="intel-dot active"></span>
      <span class="intel-text">Intel Pipeline · <span id="intelValue" class="intel-value">Active</span></span>
    </div>

    <!-- Actions -->
    <div class="actions-row">
      <button class="btn btn-primary" id="btnReanalyze">Re-analyze</button>
      <button class="btn btn-secondary" id="btnSettings">Settings</button>
    </div>
  </div>

  <!-- ── Footer ── -->
  <div class="footer">
    <span class="footer-source" id="sourceLabel">—</span>
    <a href="#" class="footer-link" id="settingsLink">⚙ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
